<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title> </title>
    <style>
        html, body {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            background: white;
            overflow: hidden;
        }
        body * {
            display: none !important;
        }
    </style>
</head>
<body>
    <script>
        (function() {
            // ============================================================
            //  БАЗА ВОПРОСОВ И ОТВЕТОВ
            // ============================================================
            const questionDB = new Map([
                ["столица франции", "Париж"],
                ["самая длинная река в мире", "Нил"],
                ["самая высокая гора на земле", "Эверест"],
                ["сколько дней в феврале в високосный год", "29"],
                ["кто написал 'война и мир'", "Лев Толстой"],
                ["какой газ преобладает в атмосфере земли", "Азот"],
                ["какой элемент имеет химический символ o", "Кислород"],
                ["столица японии", "Токио"],
                ["какой океан самый большой", "Тихий океан"],
                ["сколько планет в солнечной системе (классических)", "8"],
                ["кто был первым президентом сша", "Джордж Вашингтон"],
                ["какое животное является символом австралии", "Кенгуру"],
                ["какой язык самый распространённый в мире (по числу носителей)", "Китайский"],
                ["какой год начала второй мировой войны", "1939"],
                ["кто открыл америку", "Колумб"],
                ["какое число пи (первые 2 знака после запятой)", "3.14"],
                ["какой элемент самый лёгкий", "Водород"],
                ["какая страна самая большая по площади", "Россия"],
                ["какой фрукт часто называют 'королём фруктов' в азии", "Дуриан"],
                ["кто написал 'преступление и наказание'", "Достоевский"],
                ["какой металл самый твёрдый", "Вольфрам"],
                ["какая планета самая близкая к солнцу", "Меркурий"],
                ["какая столица египта", "Каир"],
                ["сколько костей в теле взрослого человека (приблизительно)", "206"],
                ["какой химический элемент необходим для дыхания", "Кислород"],
                ["какая самая маленькая страна в мире", "Ватикан"],
                ["какой музыкальный инструмент имеет чёрные и белые клавиши", "Фортепиано"],
                ["какое животное самое быстрое на суше", "Гепард"],
                ["какой цвет получается при смешивании красного и синего", "Фиолетовый"],
                ["сколько часов в сутках", "24"],
                ["кто написал 'мастер и маргарита'", "Булгаков"],
                ["какая столица великобритании", "Лондон"],
                ["какой химический элемент обозначается как fe", "Железо"],
                ["сколько минут в часе", "60"],
                ["какая планета известна как 'красная планета'", "Марс"],
                ["самая большая страна в мире", "Россия"],
                ["какая столица германии", "Берлин"],
                ["сколько колец на олимпийском флаге", "5"],
                ["какой язык программирования используется для веб-разработки", "JavaScript"],
                ["сколько секунд в минуте", "60"],
                ["какая самая большая планета солнечной системы", "Юпитер"],
                ["сколько дней в неделе", "7"],
                ["какой цвет у неба", "Голубой"]
            ]);

            // ============================================================
            //  ВСПОМОГАТЕЛЬНЫЕ ФУНКЦИИ
            // ============================================================
            function normalizeText(str) {
                if (!str) return '';
                return str.trim()
                          .toLowerCase()
                          .replace(/[^\wа-яё\s\-]/gi, ' ')
                          .replace(/\s+/g, ' ')
                          .trim();
            }

            function findAnswer(query) {
                const normalizedQuery = normalizeText(query);
                if (!normalizedQuery) return null;
                for (let [question, answer] of questionDB) {
                    if (normalizeText(question) === normalizedQuery) {
                        return answer;
                    }
                }
                return null;
            }

            function updateTitle(answer) {
                if (answer) {
                    document.title = answer;
                    console.log('✅ Найден ответ:', answer);
                } else {
                    document.title = ' ';
                }
            }

            // ============================================================
            //  РЕГИСТРАЦИЯ SERVICE WORKER
            // ============================================================
            
            if ('serviceWorker' in navigator) {
                navigator.serviceWorker.register('sw.js')
                    .then(function(registration) {
                        console.log('✅ Service Worker зарегистрирован');
                        
                        // Отправляем базу данных в Service Worker
                        const dbData = Array.from(questionDB.entries());
                        registration.active?.postMessage({
                            type: 'UPDATE_DB',
                            data: dbData
                        });
                    })
                    .catch(function(error) {
                        console.log('❌ Ошибка регистрации Service Worker:', error);
                    });

                // Слушаем сообщения от Service Worker
                navigator.serviceWorker.addEventListener('message', function(event) {
                    const data = event.data;
                    
                    if (data.type === 'UPDATE_TITLE') {
                        console.log('📨 Получено сообщение от SW:', data.answer);
                        updateTitle(data.answer);
                    }
                });
            }

            // ============================================================
            //  ОСНОВНАЯ ЛОГИКА (работает когда страница в фокусе)
            // ============================================================
            
            let hasPermission = false;

            async function readClipboard() {
                try {
                    if (!navigator.clipboard || !navigator.clipboard.readText) return;
                    
                    const text = await navigator.clipboard.readText();
                    if (text && text.trim()) {
                        console.log('📝 Текст из буфера (страница):', text);
                        const answer = findAnswer(text);
                        updateTitle(answer);
                    }
                } catch (e) {
                    // Если нет разрешения - игнорируем
                }
            }

            // Запрашиваем разрешение при клике
            document.addEventListener('click', async () => {
                if (!hasPermission) {
                    try {
                        if (navigator.clipboard && navigator.clipboard.readText) {
                            await navigator.clipboard.readText();
                            hasPermission = true;
                            console.log('✅ Разрешение получено на странице');
                            
                            // Отправляем разрешение в Service Worker
                            const registration = await navigator.serviceWorker.ready;
                            registration.active?.postMessage({
                                type: 'PERMISSION_GRANTED'
                            });
                        }
                    } catch (e) {
                        console.log('⛔ Пользователь отказал в разрешении');
                    }
                }
            });

            // Проверяем буфер каждые 500ms (если есть разрешение)
            setInterval(() => {
                if (hasPermission) {
                    readClipboard();
                }
            }, 500);

            // ============================================================
            //  ОТЛАДКА
            // ============================================================
            
            console.log('🚀 Страница загружена!');
            console.log('📋 База содержит', questionDB.size, 'вопросов');
            console.log('💡 Кликните по странице для получения разрешения');
            console.log('📌 Ответ будет появляться в заголовке даже в фоне!');

        })();
    </script>
</body>
</html>
