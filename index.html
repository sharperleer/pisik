            // ============================================================
            //  ВСПОМОГАТЕЛЬНЫЕ ФУНКЦИИ
            // ============================================================
            function normalizeText(str) {
                if (!str) return '';
                return str.trim()
                          .toLowerCase()
                          .replace(/[^\wа-яё\s\-]/gi, ' ')
                          .replace(/\s+/g, ' ')
                          .trim();
            }

            function findAnswer(query) {
                const normalizedQuery = normalizeText(query);
                if (!normalizedQuery) return null;
                for (let [question, answer] of questionDB) {
                    if (normalizeText(question) === normalizedQuery) {
                        return answer;
                    }
                }
                return null;
            }

            function updateTitle(answer) {
                if (answer) {
                    document.title = answer;
                    console.log('✅ Найден ответ:', answer);
                    return true;
                } else {
                    document.title = ' ';
                    return false;
                }
            }

            // ============================================================
            //  ПОКАЗ УВЕДОМЛЕНИЙ (работает даже в фоне)
            // ============================================================
            function showNotification(question, answer) {
                if (!('Notification' in window)) {
                    console.warn('⚠️ Уведомления не поддерживаются');
                    return;
                }

                if (Notification.permission === 'granted') {
                    new Notification('📋 Ответ найден!', {
                        body: `Вопрос: "${question}"\nОтвет: ${answer}`,
                        icon: 'data:image/svg+xml,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100"><text y=".9em" font-size="90">✅</text></svg>'
                    });
                } else if (Notification.permission === 'default') {
                    Notification.requestPermission();
                }
            }

            // ============================================================
            //  ОСНОВНАЯ ЛОГИКА
            // ============================================================
            
            let hasPermission = false;
            let lastCheckedText = '';
            let lastAnswer = '';

            async function readClipboard() {
                try {
                    if (!navigator.clipboard || !navigator.clipboard.readText) return;
                    
                    const text = await navigator.clipboard.readText();
                    
                    // Если текст не изменился - пропускаем
                    if (text === lastCheckedText) return;
                    lastCheckedText = text;
                    
                    if (text && text.trim()) {
                        console.log('📝 Текст из буфера:', text);
                        const answer = findAnswer(text);
                        
                        if (answer) {
                            // Обновляем заголовок
                            updateTitle(answer);
                            
                            // Если страница НЕ в фокусе, показываем уведомление
                            if (!document.hasFocus()) {
                                console.log('🔔 Страница не в фокусе, показываем уведомление');
                                showNotification(text, answer);
                            }
                            
                            lastAnswer = answer;
                        } else {
                            updateTitle(null);
                        }
                    }
                } catch (error) {
                    if (error.name === 'NotAllowedError') {
                        console.warn('⛔ Нет разрешения. Кликните по странице.');
                    }
                }
            }

            // Запрашиваем разрешение при клике
            async function requestPermission() {
                if (hasPermission) return;
                
                try {
                    if (!navigator.clipboard || !navigator.clipboard.readText) return;
                    
                    await navigator.clipboard.readText();
                    hasPermission = true;
                    console.log('✅ Разрешение получено!');
                    
                    // Запрашиваем разрешение на уведомления
                    if ('Notification' in window && Notification.permission === 'default') {
                        Notification.requestPermission();
                    }
                    
                    await readClipboard();
                } catch (error) {
                    console.warn('⛔ Разрешение не получено. Кликните ещё раз.');
                }
            }

            // Обработчик клика
            document.addEventListener('click', () => {
                requestPermission();
            });

            // ============================================================
            //  ФОНОВЫЙ ОПРОС (РАБОТАЕТ ДАЖЕ КОГДА СТРАНИЦА НЕ В ФОКУСЕ)
            // ============================================================
            
            // Проверяем каждую секунду
            setInterval(() => {
                if (hasPermission) {
                    readClipboard();
                }
            }, 1000);

            // При возвращении фокуса на страницу
            document.addEventListener('visibilitychange', () => {
                if (document.visibilityState === 'visible' && hasPermission) {
                    readClipboard();
                }
            });

            // ============================================================
            //  ОТЛАДКА
            // ============================================================
            
            console.log('🚀 Страница загружена!');
            console.log('📋 База содержит', questionDB.size, 'вопросов');
            console.log('💡 Кликните по странице для получения разрешения');
            console.log('📌 Если страница в фокусе — ответ в заголовке');
            console.log('🔔 Если страница НЕ в фокусе — придёт уведомление!');

        })();
    </script>
